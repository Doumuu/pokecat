<!DOCTYPE html>
<html lang="ca">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Projecte de localització de Pokémon vermell/blau</title>
    <style>
      html,body{height:100%;margin:0}
      body{display:flex;flex-direction:column;align-items:center;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial;color:#222;background:#f7f7f7}
      header{width:100%;max-width:960px;padding:36px 16px 8px;box-sizing:border-box}
      h1{margin:0;text-align:center;font-size:1.5rem}
      .center{width:100%;max-width:960px;padding:20px 16px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center}
      .buttons{display:flex;gap:14px;margin-top:18px}
      .btn{display:flex;flex-direction:column;align-items:center;padding:10px;border-radius:8px;border:0;background:#cd3a3a;color:white;text-decoration:none;font-weight:600;transition:all 0.3s ease}
      .btn.secondary{background:#226abb}
      .btn span{margin-top:8px}
      .btn:hover{filter:brightness(1.5)}
      .btn.tertiary{background:#199f4a}
      @media (max-width:480px){.buttons{flex-direction:column;width:100%}.btn{width:100%;text-align:center}}
    </style>
  </head>
  <body>
    <header>
      <h1>Projecte de localització de Pokémon vermell/blau</h1>
      <p style="text-align: center;">Per a més informació, uniu-vos al nostre <a href="https://discord.gg/HRGvazSPPq" target="_blank" rel="noopener noreferrer">servidor de Discord</a>.</p>
    </header>
    <main class="center">
      <div class="buttons" role="navigation" aria-label="Enllaços principals">
        <a class="btn" href="pokedex.html"><img src="pokedex.png" alt="Pokédex" width="200"><span>Pokédex</span></a>
        <a class="btn secondary" href="moviments.html"><img src="clipboard.png" alt="Moviments" width="200"><span>Moviments</span></a>
        <a class="btn tertiary" href="objectes.html"><img src="pokeball.png" alt="Objectes" width="200"><span>Objectes</span></a>
      </div>
    </main>
  </body>
</html>
